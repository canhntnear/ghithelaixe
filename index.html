<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Thẻ Lái Xe QCVN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #00796B;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00796B;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #004D40;
        }
        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .info { background-color: #E0F7FA; color: #006064; }
        .success { background-color: #E8F5E9; color: #2E7D32; }
        .error { background-color: #FFEBEE; color: #C62828; }
    </style>
</head>
<body>

<div class="container">
    <h2>GHI THẺ LÁI XE QCVN</h2>
    
    <div class="form-group">
        <label for="gplx">Số GPLX (Tối đa 15 ký tự):</label>
        <input type="text" id="gplx" maxlength="15" placeholder="Ví dụ: 790123456789" value="790123456789">
    </div>

    <div class="form-group">
        <label for="hoten">Họ và tên (Chữ không dấu, tối đa 43 ký tự):</label>
        <input type="text" id="hoten" maxlength="43" placeholder="Ví dụ: NGUYEN VAN A" value="NGUYEN VAN A">
    </div>

    <button id="btnWrite">BẮT ĐẦU GHI THẺ</button>

    <div id="status"></div>
</div>

<script>
    const btnWrite = document.getElementById('btnWrite');
    const statusDiv = document.getElementById('status');

    function showStatus(text, type) {
        statusDiv.style.display = 'block';
        statusDiv.innerText = text;
        statusDiv.className = `info ${type}`;
    }

    // Thuật toán tính mã kiểm tra: Tổng các byte & 255 lấy byte thấp
    function calculateChecksum(uint8Array) {
        let sum = 0;
        for (let i = 0; i < uint8Array.length; i++) {
            sum += uint8Array[i];
        }
        return sum & 0xFF;
    }

    btnWrite.addEventListener('click', async () => {
        // 1. Kiểm tra xem trình duyệt có hỗ trợ WebNFC không
        if (!('NDEFReader' in window)) {
            showStatus("Trình duyệt hoặc thiết bị của bạn không hỗ trợ WebNFC. Hãy thử lại bằng Chrome trên Android.", "error");
            return;
        }

        const gplxInput = document.getElementById('gplx').value.trim();
        const hotenInput = document.getElementById('hoten').value.trim().toUpperCase();

        if (!gplxInput || !hotenInput) {
            showStatus("Vui lòng điền đầy đủ số GPLX và Họ tên!", "error");
            return;
        }

        try {
            showStatus("Đang chuẩn bị dữ liệu mã hóa...", "info");

            // --- XỬ LÝ VÙNG 1: SỐ GPLX (16 Byte) ---
            const gplxBuffer = new Uint8Array(15);
            // Điền chuỗi ASCII vào buffer, nếu thiếu tự động để trống
            for (let i = 0; i < 15; i++) {
                gplxBuffer[i] = i < gplxInput.length ? gplxInput.charCodeAt(i) : 0x20; // 0x20 là khoảng trắng
            }
            const gplxChecksum = calculateChecksum(gplxBuffer);

            // --- XỬ LÝ VÙNG 2: HỌ TÊN LÁI XE (44 Byte) ---
            const nameBuffer = new Uint8Array(43);
            for (let i = 0; i < 43; i++) {
                nameBuffer[i] = i < hotenInput.length ? hotenInput.charCodeAt(i) : 0x00; // 0x00 theo chuẩn đệm padding
            }
            const nameChecksum = calculateChecksum(nameBuffer);

            // --- GỘP TOÀN BỘ DỮ LIỆU ĐẠT CHUẨN (60 Byte) ---
            const totalPayload = new Uint8Array(60);
            totalPayload.set(gplxBuffer, 0);
            totalPayload[15] = gplxChecksum;
            totalPayload.set(nameBuffer, 16);
            totalPayload[59] = nameChecksum;

            // 2. Kích hoạt đầu đọc và tiến hành ghi đè dữ liệu thô (Mime Type)
            showStatus("Vui lòng quẹt thẻ lái xe vào lưng điện thoại...", "info");
            
            const ndef = new NDEFReader();
            await ndef.write({
                records: [{
                    recordType: "mime",
                    mediaType: "application/octet-stream",
                    data: totalPayload
                }]
            });

            showStatus("Ghi thẻ thành công! Thẻ đã đạt chuẩn QCVN.", "success");

        } catch (error) {
            showStatus("Lỗi khi ghi thẻ: " + error.message, "error");
            console.error(error);
        }
    });
</script>

</body>
</html>
