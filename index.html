<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Thẻ Lái Xe QCVN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 550px;
            margin: 20px auto;
            padding: 15px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #00796B;
            margin-bottom: 25px;
            font-size: 21px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        #btnWrite { background-color: #00796B; }
        #btnWrite:hover { background-color: #004D40; }
        #btnRead { background-color: #0288D1; }
        #btnRead:hover { background-color: #01579B; }
        
        #status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: none;
            font-size: 15px;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fafafa;
            display: none;
        }
        .result-title {
            font-weight: bold;
            color: #00796B;
            border-bottom: 2px solid #00796B;
            padding-bottom: 5px;
            margin-bottom: 12px;
        }
        .result-item {
            margin-bottom: 8px;
            font-size: 16px;
        }
        .final-verdict {
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            font-size: 16px;
        }
        
        .info { background-color: #E0F7FA; color: #006064; }
        .success { background-color: #E8F5E9; color: #2E7D32; }
        .error { background-color: #FFEBEE; color: #C62828; }
        .verdict-pass { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>THIẾT BỊ QUẢN LÝ THẺ LÁI XE QCVN</h2>
    
    <div class="form-group">
        <label for="gplx">Số GPLX (Tối đa 15 ký tự):</label>
        <input type="text" id="gplx" maxlength="15" placeholder="Ví dụ: 790123456789" value="790123456789">
    </div>

    <div class="form-group">
        <label for="hoten">Họ và tên (Không dấu, tối đa 43 ký tự):</label>
        <input type="text" id="hoten" maxlength="43" placeholder="Ví dụ: NGUYEN VAN A" value="NGUYEN VAN A">
    </div>

    <div class="btn-group">
        <button id="btnRead">BẮT ĐẦU ĐỌC THẺ</button>
        <button id="btnWrite">GHI DỮ LIỆU VÀO THẺ</button>
    </div>

    <div id="status"></div>

    <div id="resultBox" class="result-box">
        <div class="result-title">THÔNG TIN LÁI XE TRÊN THẺ</div>
        <div class="result-item"><strong>Số GPLX:</strong> <span id="resGplx">---</span></div>
        <div class="result-item"><strong>Họ và tên:</strong> <span id="resHoTen">---</span></div>
        
        <div id="finalVerdict" class="final-verdict verdict-pass">
            ✓ Thẻ đạt chuẩn 100% theo quy định của BCA
        </div>
    </div>
</div>

<script {nonce}>
    const btnWrite = document.getElementById('btnWrite');
    const btnRead = document.getElementById('btnRead');
    const statusDiv = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    
    const resGplx = document.getElementById('resGplx');
    const resHoTen = document.getElementById('resHoTen');

    function showStatus(text, type) {
        statusDiv.style.display = 'block';
        statusDiv.innerText = text;
        statusDiv.className = `info ${type}`;
    }

    // Thuật toán tính mã kiểm tra: Tổng các byte & 255 lấy byte thấp
    function calculateChecksum(uint8Array) {
        let sum = 0;
        for (let i = 0; i < uint8Array.length; i++) {
            sum += uint8Array[i];
        }
        return sum & 0xFF;
    }

    // ================= CHỨC NĂNG ĐỌC & KIỂM TRA CHUẨN NGẦM =================
    btnRead.addEventListener('click', async () => {
        if (!('NDEFReader' in window)) {
            showStatus("Thiết bị hoặc trình duyệt không hỗ trợ WebNFC. Hãy dùng Chrome trên Android.", "error");
            return;
        }

        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            showStatus("Vui lòng quẹt thẻ lái xe vào lưng điện thoại...", "info");
            resultBox.style.display = 'none';

            ndef.addEventListener("reading", ({ message }) => {
                // Biến cờ chạy ngầm để kiểm tra toàn bộ tiêu chuẩn
                let isHardwareValid = false;
                let isDataStructureValid = false;
                let isChecksumValid = false;

                for (const record of message.records) {
                    // 1. KIỂM TRA NGẦM PHẦN CỨNG: Phải đúng định dạng truyền tải dữ liệu thô (chuẩn ISO 15693 / NfcV trên WebNFC)
                    if (record.recordType === "mime" || record.mediaType === "application/octet-stream") {
                        isHardwareValid = true;
                        
                        const rawData = new Uint8Array(record.data.buffer);
                        
                        // 2. KIỂM TRA NGẦM CẤU TRÚC BỘ NHỚ: Đủ tối thiểu 60 byte dữ liệu QCVN
                        if (rawData.length >= 60) {
                            isDataStructureValid = true;
                        } else {
                            break;
                        }

                        // Tách dữ liệu Vùng 1 (GPLX) và Vùng 2 (Họ tên)
                        const gplxPart = rawData.slice(0, 15);
                        const gplxChecksumOnCard = rawData[15];
                        const gplxCalculatedChecksum = calculateChecksum(gplxPart);
                        
                        const namePart = rawData.slice(16, 59);
                        const nameChecksumOnCard = rawData[59];
                        const nameCalculatedChecksum = calculateChecksum(namePart);

                        // 3. KIỂM TRA NGẦM THUẬT TOÁN KIỂM TRA (CHECKSUM)
                        if (gplxChecksumOnCard === gplxCalculatedChecksum && nameChecksumOnCard === nameCalculatedChecksum) {
                            isChecksumValid = true;
                        }

                        // Xử lý chuỗi hiển thị ra màn hình
                        let txtGplx = new TextDecoder("ascii").decode(gplxPart).trim();
                        
                        let validNameLength = 0;
                        for(let i=0; i<namePart.length; i++) {
                            if(namePart[i] === 0x00) break;
                            validNameLength++;
                        }
                        let txtHoTen = new TextDecoder("ascii").decode(namePart.slice(0, validNameLength)).trim();

                        // KIỂM TRA TỔNG HỢP BIẾN CỜ CHẠY NGẦM
                        if (isHardwareValid && isDataStructureValid && isChecksumValid) {
                            resGplx.innerText = txtGplx;
                            resHoTen.innerText = txtHoTen;
                            
                            showStatus("Đọc dữ liệu hoàn tất!", "success");
                            resultBox.style.display = 'block';
                            return;
                        }
                    }
                }

                // Nếu có bất kỳ bước kiểm tra ngầm nào thất bại
                showStatus("Thẻ lỗi hoặc KHÔNG đạt tiêu chuẩn quy định của BCA!", "error");
                resultBox.style.display = 'none';
            });

        } catch (error) {
            showStatus("Lỗi khi quét thẻ: " + error.message, "error");
        }
    });

    // ================= CHỨC NĂNG GHI DỮ LIỆU ĐẠT CHUẨN =================
    btnWrite.addEventListener('click', async () => {
        if (!('NDEFReader' in window)) {
            showStatus("Thiết bị hoặc trình duyệt không hỗ trợ WebNFC.", "error");
            return;
        }

        const gplxInput = document.getElementById('gplx').value.trim();
        const hotenInput = document.getElementById('hoten').value.trim().toUpperCase();

        if (!gplxInput || !hotenInput) {
            showStatus("Vui lòng điền đầy đủ số GPLX và Họ tên trước khi ghi!", "error");
            return;
        }

        try {
            showStatus("Đang chuẩn bị dữ liệu...", "info");

            // Khởi tạo vùng đệm đúng quy chuẩn
            const gplxBuffer = new Uint8Array(15);
            for (let i = 0; i < 15; i++) {
                gplxBuffer[i] = i < gplxInput.length ? gplxInput.charCodeAt(i) : 0x20;
            }
            const gplxChecksum = calculateChecksum(gplxBuffer);

            const nameBuffer = new Uint8Array(43);
            for (let i = 0; i < 43; i++) {
                nameBuffer[i] = i < hotenInput.length ? hotenInput.charCodeAt(i) : 0x00;
            }
            const nameChecksum = calculateChecksum(nameBuffer);

            const totalPayload = new Uint8Array(60);
            totalPayload.set(gplxBuffer, 0);
            totalPayload[15] = gplxChecksum;
            totalPayload.set(nameBuffer, 16);
            totalPayload[59] = nameChecksum;

            showStatus("Vui lòng giữ cố định thẻ lái xe ở lưng điện thoại để ghi...", "info");
            
            const ndef = new NDEFReader();
            await ndef.write({
                records: [{
                    recordType: "mime",
                    mediaType: "application/octet-stream",
                    data: totalPayload
                }]
            });

            showStatus("Ghi thẻ thành công! Thẻ được cấu trúc đạt chuẩn BCA.", "success");

        } catch (error) {
            showStatus("Lỗi khi ghi: " + error.message, "error");
        }
    });
</script>

</body>
</html>
